server {
    server_name kelvin.openconverters.com;

    access_log /var/log/kelvin_web_access.log;
    error_log /var/log/kelvin_web_error.log;

    charset utf-8;
    root    /opt/kelvin/dist;
    index   index.html;

    # Serve the pre-generated .gz twins (kelvin.js.gz is 0.4M vs 1.35M raw).
    gzip_static on;

    # Content-hashed build assets — safe to cache hard.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The engine bundle has a stable name, so revalidate (ETag/304) instead of
    # caching blind — a redeploy must reach returning visitors.
    location = /kelvin.js {
        add_header Cache-Control "no-cache";
    }

    # Kelvin TAS-DB parts data, served off the /cache volume (the SAME
    # self-consistent set kirchhoff.openconverters.com serves) — NOT a backend,
    # just static files. .kidx shards are whole-file fetches cache-busted by a
    # ?b=<buildId> query, so cache them hard.
    location ~ ^/kelvin/.+\.kidx$ {
        root /cache;
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    # manifest.json (the redeploy invalidation point) + the .ndjson catalogs the
    # part drawer HTTP Range-reads one record at a time (nginx serves 206 for
    # static files by default). Revalidate so a data redeploy is picked up.
    location /kelvin/ {
        root /cache;
        gzip_static on;
        add_header Cache-Control "no-cache";
    }

    # Interaction telemetry → the local oc-telemetry service (writes to the shared
    # OM Postgres, openconverters_telemetry schema). Same-origin, so no CORS.
    location = /telemetry {
        proxy_pass http://127.0.0.1:8787/telemetry;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
        client_max_body_size 16k;
    }

    # Umami analytics (reused OM instance on this box, 127.0.0.1:3001, BASE_PATH=/stats).
    # Served same-origin so the tracker is first-party (adblock-resistant). Dashboard
    # is unlinked + login-only.
    location = /stats { return 308 /stats/; }
    location /stats/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: fall back to the shell, and never cache the shell so redeploys show.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    listen 80;
}
